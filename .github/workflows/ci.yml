# CI for the Next.js ID Pirate app — runs unit, component, type, and Lambda checks.
# E2E tests (Playwright) are not included yet (need browser binaries + dev server).
# Replaces the legacy deno.yml workflow inherited from the boilerplate template.

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit + component tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lambda:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install --no-cache-dir boto3 moto pytest PyJWT pyzipper

      - name: Run Lambda tests
        run: python3 -m pytest integration/discounts/tests/ -v
